<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دراجتك</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .icon { font-size: 52px; margin-bottom: 0.5rem; }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 0.4rem; }
    .sub { font-size: 13px; color: #888; margin-bottom: 1.8rem; }
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      text-align: right;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 1rem;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: #0f3460; }
    button {
      width: 100%;
      padding: 13px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    button:hover { background: #16213e; }
    button:active { transform: scale(0.98); }
    .result {
      margin-top: 1.8rem;
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 14px;
      padding: 1.5rem;
      display: none;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .result .name { font-size: 15px; color: #555; margin-bottom: 0.5rem; }
    .result .grade { font-size: 54px; font-weight: bold; color: #15803d; }
    .result .out { font-size: 13px; color: #16a34a; margin-top: 0.2rem; }
    .stars { font-size: 26px; margin-top: 0.6rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎓</div>
    <h1>درجتك ان شاء الله</h1>
    <p class="sub">أدخل اسمك  واضغط الزر للحصول على درجته</p>

    <input type="text" id="nameInput" placeholder="اكتب اسم الطالب هنا..." />
    <button onclick="generateGrade()">احسب الدرجة 🎲</button>

    <div class="result" id="result">
      <div class="name" id="resultName"></div>
      <div class="grade" id="resultGrade"></div>
      <div class="out">من 100</div>
      <div class="stars" id="stars"></div>]v[m]
    </div>
  </div>

  <script>
    function generateGrade() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) { alert('من فضلك أدخل اسم الطالب أولاً'); return; }
      const grade = Math.floor(Math.random() * 11) + 89;
      document.getElementById('resultName').textContent = 'درجة الطالب: ' + name;
      document.getElementById('resultGrade').textContent = grade + '%';
      const stars = grade >= 97 ? '⭐⭐⭐' : grade >= 93 ? '⭐⭐' : '⭐';
      document.getElementById('stars').textContent = stars;
      const r = document.getElementById('result');
      r.style.display = 'none';
      void r.offsetWidth;
      r.style.display = 'block';
    }
    document.getElementById('nameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') generateGrade();
    });
  </script>
</body>
</html>
